<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leadership OS — animated logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#faf8f4; --ink:#1a1612; --gold:#b8671e; --gold-l:#c9843a;
    --violet:#6b5bd1; --green:#2e9e7e; --line:#cfc7ba;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--cream);
    display:flex; align-items:center; justify-content:center;
    min-height:100vh;
    font-family:'Cormorant Garamond',Georgia,serif;
  }
  /* The recording stage — a clean square. Screen-record THIS area. */
  .stage{
    width:1080px; height:1080px;
    background:var(--cream);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  /* dark variant: add class="dark" to <body> to record the reversed version */
  body.dark{background:var(--ink);}
  body.dark .stage{background:var(--ink);}

  .logo-wrap{ transform:scale(2.4); }

  svg{ display:block; overflow:visible; }

  /* ---------- ANIMATION ---------- */
  /* total loop ~6s. points appear -> lines converge -> ring forms -> wordmark settles -> hold -> gentle continuous open rotation -> soft reset */

  .pt{ transform-box:fill-box; transform-origin:center; opacity:0; animation:ptIn 0.0s forwards; }
  .pt-a{ animation:ptIn 0.7s cubic-bezier(.2,.7,.3,1) 0.2s forwards; }
  .pt-b{ animation:ptIn 0.7s cubic-bezier(.2,.7,.3,1) 0.45s forwards; }
  .pt-c{ animation:ptIn 0.7s cubic-bezier(.2,.7,.3,1) 0.7s forwards; }
  @keyframes ptIn{
    0%{ opacity:0; transform:scale(0); }
    60%{ opacity:1; transform:scale(1.25); }
    100%{ opacity:1; transform:scale(1); }
  }

  .cl{ stroke-dasharray:60; stroke-dashoffset:60; opacity:0; animation:lineDraw 0.6s ease-out 1.0s forwards; }
  @keyframes lineDraw{ to{ stroke-dashoffset:0; opacity:1; } }

  /* the open dashed center: scribes in, then rotates forever (never closes = hypothesis) */
  .ring{ transform-box:fill-box; transform-origin:center; opacity:0;
    animation:ringIn 0.7s ease-out 1.5s forwards, ringSpin 14s linear 2.2s infinite; }
  @keyframes ringIn{
    0%{ opacity:0; transform:scale(0.2) rotate(-40deg); }
    100%{ opacity:1; transform:scale(1) rotate(0deg); }
  }
  @keyframes ringSpin{ to{ transform:rotate(360deg); } }

  /* wordmark fades + rises in after the mark resolves */
  .wm{ opacity:0; transform:translateY(8px); animation:wmIn 0.9s cubic-bezier(.2,.7,.3,1) 1.9s forwards; }
  @keyframes wmIn{ to{ opacity:1; transform:translateY(0); } }

  /* whole logo gently breathes during the long hold, then the loop restarts cleanly */
  .logo-wrap{ animation:loopReset 6s ease-in-out infinite; }
  @keyframes loopReset{
    0%{ opacity:0; }
    8%{ opacity:1; }
    88%{ opacity:1; }
    100%{ opacity:0; }
  }
  /* restart the timed-once animations each loop by re-triggering via the wrap's iteration */
  .logo-wrap{ }
</style>
</head>
<body>
  <div class="stage">
    <div class="logo-wrap">
      <svg viewBox="-26 -8 360 72" width="360" height="72" role="img" aria-label="Leadership OS">
        <title>Leadership OS</title>
        <!-- mark, centered around (6,28) like the static logo -->
        <g>
          <line class="cl" x1="-14" y1="-11" x2="0" y2="0" transform="translate(6,28)" stroke="#cfc7ba" stroke-width="1.3"/>
          <line class="cl" x1="14" y1="-11" x2="0" y2="0" transform="translate(6,28)" stroke="#cfc7ba" stroke-width="1.3"/>
          <line class="cl" x1="0" y1="16" x2="0" y2="0" transform="translate(6,28)" stroke="#cfc7ba" stroke-width="1.3"/>
          <circle class="ring" cx="6" cy="28" r="6.5" fill="none" stroke="#b8671e" stroke-width="1.2" stroke-dasharray="2.3 2.7"/>
          <circle class="pt pt-a" cx="-8" cy="17" r="2.9" fill="#6b5bd1"/>
          <circle class="pt pt-b" cx="20" cy="17" r="2.9" fill="#2e9e7e"/>
          <circle class="pt pt-c" cx="6" cy="44" r="2.9" fill="#b8671e"/>
        </g>
        <text class="wm" x="42" y="38" font-family="'Cormorant Garamond',Georgia,serif" font-size="34" font-weight="300" fill="#1a1612">Leadership <tspan font-weight="700" font-style="italic" fill="#b8671e">OS</tspan></text>
      </svg>
    </div>
  </div>

<script>
  // Re-trigger the one-shot animations each loop so it plays cleanly on repeat.
  const wrap = document.querySelector('.logo-wrap');
  const ones = wrap.querySelectorAll('.pt,.cl,.ring,.wm');
  function restart(){
    ones.forEach(el=>{ el.style.animation='none'; void el.offsetWidth; el.style.animation=''; });
  }
  // align the re-trigger to the 6s loopReset cycle
  setInterval(restart, 6000);

  // Toggle dark/reversed variant with the 'd' key (for recording the on-ink version)
  document.addEventListener('keydown', e=>{
    if(e.key==='d'){
      document.body.classList.toggle('dark');
      const dark = document.body.classList.contains('dark');
      // swap wordmark + line colors for reversed
      const wm = document.querySelector('.wm');
      wm.setAttribute('fill', dark ? '#faf8f4' : '#1a1612');
      wm.querySelector('tspan').setAttribute('fill', dark ? '#c9843a' : '#b8671e');
      document.querySelectorAll('.cl').forEach(l=>l.setAttribute('stroke', dark ? '#4a443c' : '#cfc7ba'));
      document.querySelector('.ring').setAttribute('stroke', dark ? '#c9843a' : '#b8671e');
      const pts = document.querySelectorAll('.pt');
      if(dark){ pts[0].setAttribute('fill','#8b7ee0'); pts[1].setAttribute('fill','#4cbf9e'); pts[2].setAttribute('fill','#c9843a'); }
      else{ pts[0].setAttribute('fill','#6b5bd1'); pts[1].setAttribute('fill','#2e9e7e'); pts[2].setAttribute('fill','#b8671e'); }
    }
  });
</script>
</body>
</html>
